name: Build NetHunter Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils bison flex libelf-dev clang lld git gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Pull Kernel Source
        run: |
          git clone --depth=1 -b sixteen https://github.com/sarthakroy2002/kernel_realme_RMX2020 kernel-source

      - name: Fix Code Error Automatically
        run: |
          sed -i 's/extern inline unsigned long vm_mmap_pgoff_with_check/unsigned long vm_mmap_pgoff_with_check/g' kernel-source/include/linux/resmap_account.h

      - name: Build Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export CC=clang
          export LD=ld.lld
          
          make O=out RMX2020_defconfig
          make O=out -j1

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Kernel-Image
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
