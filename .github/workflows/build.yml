name: Build NetHunter Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Android Kernel Build Action
        uses: Fyg369/Kernel-Action@main
        with:
          kernel-url: https://github.com/sarthakroy2002/kernel_realme_RMX2020
          kernel-branch: sixteen
          config-file: RMX2020_defconfig
          compiler: aosp-clang
          clang-version: r510928
          ksu: true
          ksu-version: main
