name: Build NetHunter Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils bison flex libelf-dev clang lld git gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Pull Kernel Source
        run: |
          git clone --depth=1 -b sixteen https://github.com/sarthakroy2002/kernel_realme_RMX2020 kernel-source

      - name: Fix Code Errors Automatically
        run: |
          # Fix resmap_account inline error
          sed -i 's/extern inline unsigned long vm_mmap_pgoff_with_check/unsigned long vm_mmap_pgoff_with_check/g' kernel-source/include/linux/resmap_account.h
          
          # Fix keyslot-manager inline error
          sed -i 's/inline void ksm_flock/void ksm_flock/g' kernel-source/include/linux/keyslot-manager.h

          # Fix all mtk_ion inline errors in mtk_ion_priv.h
          sed -i 's/inline void __mtk_ion_drv_clean_max_islands/void __mtk_ion_drv_clean_max_islands/g' kernel-source/drivers/staging/android/ion/mtk/mtk_ion_priv.h
          sed -i 's/inline bool __mtk_ion_drv_is_island_client/bool __mtk_ion_drv_is_island_client/g' kernel-source/drivers/staging/android/ion/mtk/mtk_ion_priv.h
          sed -i 's/inline void __mtk_ion_drv_clean_island/void __mtk_ion_drv_clean_island/g' kernel-source/drivers/staging/android/ion/mtk/mtk_ion_priv.h

          # Fix mtk_hdmi inline errors
          sed -i 's/inline void mtk_hdmi_vdo_output/void mtk_hdmi_vdo_output/g' kernel-source/drivers/misc/mediatek/hdmi/mtk_hdmi_priv.h
          sed -i 's/inline void mtk_hdmi_vdo_output/void mtk_hdmi_vdo_output/g' kernel-source/drivers/misc/mediatek/hdmi/mtk_hdmi.h

          # Fix mtk_imgsensor inline error
          sed -i 's/inline int kdSetSpeed/int kdSetSpeed/g' kernel-source/drivers/misc/mediatek/imgsensor/inc/kd_imgsensor.h

          # Fix mtk_connectivity (wlan) inline error
          sed -i 's/inline uint32_t gl_rst_bus_read_32/uint32_t gl_rst_bus_read_32/g' kernel-source/drivers/misc/mediatek/connectivity/wlan/gen4/gl_rst.h

      - name: Build Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export CC=clang
          export LD=ld.lld
          
          make O=out RMX2020_defconfig
          make -j$(nproc --all) O=out
